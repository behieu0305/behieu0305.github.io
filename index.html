<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Dịch Vụ - TeoBanker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
            margin-top: 10px;
        }
        .header img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .header h1 {
            margin: 0;
            color: #1c1e21;
            font-size: 24px;
        }
        .header p {
            margin: 5px 0 0;
            color: #65676b;
            font-size: 14px;
        }
        .menu-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .menu-item {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #1c1e21;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .menu-item:active {
            transform: scale(0.97);
            background-color: #f7f8fa;
            box-shadow: 0 1px 4px rgba(0,0,0,0.02);
        }
        .icon {
            font-size: 24px;
            margin-right: 15px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        
        /* Màu nền riêng cho từng icon */
        .icon-blue { background-color: #e7f3ff; color: #1877f2; }
        .icon-green { background-color: #e6f4ea; color: #137333; }
        .icon-purple { background-color: #f3e8fd; color: #7627bb; }
        .icon-orange { background-color: #fce8e6; color: #d93025; }

        .item-text {
            flex-grow: 1;
        }
        .item-title {
            font-weight: 600;
            font-size: 16px;
            margin: 0 0 4px 0;
        }
        .item-desc {
            font-size: 13px;
            color: #65676b;
            margin: 0;
        }
        .arrow {
            color: #bcc0c4;
            font-weight: bold;
            font-size: 18px;
        }
        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #8a8d91;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://ui-avatars.com/api/?name=Teo+Banker&background=1877f2&color=fff&size=128&font-size=0.33" alt="Logo">
        <h1>TÈO BANKER</h1>
        <p>Hệ thống hỗ trợ dịch vụ tự động</p>
    </div>

    <div class="menu-container">
        <a href="#" class="menu-item">
            <div class="icon icon-blue">🪪</div>
            <div class="item-text">
                <h2 class="item-title">Mô Phỏng Định Danh</h2>
                <p class="item-desc">Tạo video chân dung lật thẻ</p>
            </div>
            <div class="arrow">›</div>
        </a>

        <a href="#" class="menu-item">
            <div class="icon icon-green">🏦</div>
            <div class="item-text">
                <h2 class="item-title">Bank Theo Tên</h2>
                <p class="item-desc">Hỗ trợ MSB, BIDV & Lịch sử</p>
            </div>
            <div class="arrow">›</div>
        </a>

        <a href="#" class="menu-item">
            <div class="icon icon-purple">📱</div>
            <div class="item-text">
                <h2 class="item-title">Cài Đặt Vcam</h2>
                <p class="item-desc">Hỗ trợ hệ điều hành iOS & Android</p>
            </div>
            <div class="arrow">›</div>
        </a>

        <a href="https://t.me/teobanker" class="menu-item">
            <div class="icon icon-orange">👨‍💻</div>
            <div class="item-text">
                <h2 class="item-title">Liên Hệ Admin</h2>
                <p class="item-desc">Trực tiếp hỗ trợ qua Telegram</p>
            </div>
            <div class="arrow">›</div>
        </a>
    </div>

    <div class="footer">
        <p>© 2026 Hệ thống vận hành bởi TeoBanker</p>
    </div>

</body>
</html>
