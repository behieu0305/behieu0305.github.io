<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TÈO BANKER - PRO SYSTEM</title>
    <style>
        /* Cấu hình cơ bản */
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            min-height: 100vh;
            position: relative; /* Để lớp nền mờ neo vào đây */
            z-index: 1; /* Giữ nội dung nổi lên trên */
        }

        /* Lớp phủ Ảnh nền mờ (Đã tích hợp ảnh bg.jpg của bạn) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg.jpg'); /* Gọi đúng tên ảnh bạn vừa tải lên */
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.4); /* Làm mờ 8px và tối đi để nổi bật nút bấm */
            z-index: -1; /* Đẩy lớp ảnh này xuống dưới cùng */
        }

        /* Tiêu đề & Avatar phát sáng */
        .header {
            text-align: center;
            margin-bottom: 35px;
            animation: fadeInDown 0.8s ease-out;
        }
        .header img {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 2px solid #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            padding: 3px;
            background: #0b0f19;
        }
        .header h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }
        .header p {
            margin: 8px 0 0;
            color: #cbd5e1;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        /* Khu vực Menu kính mờ (Glassmorphism) */
        .menu-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .menu-item {
            background: rgba(30, 41, 59, 0.65); /* Nền nút trong suốt hơn để lộ ảnh nền */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15); /* Viền sáng nhẹ */
            border-radius: 20px;
            padding: 18px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #f8fafc;
            transition: all 0.3s ease;
            opacity: 0;
            animation: slideUp 0.6s forwards;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        /* Hiệu ứng khi chạm */
        .menu-item:active {
            transform: scale(0.96);
            border-color: rgba(96, 165, 250, 0.6);
            box-shadow: 0 0 20px rgba(96, 165, 250, 0.4);
        }

        /* Độ trễ xuất hiện */
        .menu-item:nth-child(1) { animation-delay: 0.1s; }
        .menu-item:nth-child(2) { animation-delay: 0.2s; }
        .menu-item:nth-child(3) { animation-delay: 0.3s; }
        .menu-item:nth-child(4) { animation-delay: 0.4s; }

        /* Icon Gradient rực rỡ */
        .icon {
            font-size: 24px;
            margin-right: 18px;
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0));
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        /* Cấu hình màu icon riêng biệt */
        .icon-blue { text-shadow: 0 0 15px rgba(56, 189, 248, 0.9); }
        .icon-green { text-shadow: 0 0 15px rgba(52, 211, 153, 0.9); }
        .icon-purple { text-shadow: 0 0 15px rgba(192, 132, 252, 0.9); }
        .icon-orange { text-shadow: 0 0 15px rgba(251, 146, 60, 0.9); }

        .item-text { flex-grow: 1; }
        .item-title {
            font-weight: 700;
            font-size: 16px;
            margin: 0 0 5px 0;
            color: #ffffff;
        }
        .item-desc {
            font-size: 13px;
            color: #cbd5e1;
            margin: 0;
            line-height: 1.4;
        }
        .arrow {
            color: #94a3b8;
            font-size: 22px;
            transition: color 0.3s;
        }
        .menu-item:active .arrow { color: #60a5fa; }

        .footer {
            margin-top: auto;
            padding-top: 40px;
            font-size: 12px;
            color: #94a3b8;
            text-align: center;
            animation: fadeIn 1.5s ease-out;
        }

        /* Hoạt ảnh */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://ui-avatars.com/api/?name=Teo+Banker&background=0b0f19&color=3b82f6&size=128&bold=true" alt="Logo">
        <h1>TÈO BANKER</h1>
        <p>Trung Tâm Hệ Thống Tự Động</p>
    </div>

    <div class="menu-container">
        <a href="#" class="menu-item">
            <div class="icon icon-blue">🪪</div>
            <div class="item-text">
                <h2 class="item-title">Mô Phỏng Định Danh</h2>
                <p class="item-desc">Hệ thống tạo video lật thẻ</p>
            </div>
            <div class="arrow">›</div>
        </a>

        <a href="#" class="menu-item">
            <div class="icon icon-green">🏦</div>
            <div class="item-text">
                <h2 class="item-title">Bank Theo Tên</h2>
                <p class="item-desc">Hỗ trợ giao dịch MSB & BIDV</p>
            </div>
            <div class="arrow">›</div>
        </a>

        <a href="#" class="menu-item">
            <div class="icon icon-purple">📱</div>
            <div class="item-text">
                <h2 class="item-title">Cài Đặt Vcam</h2>
                <p class="item-desc">Tích hợp iOS & Android</p>
            </div>
            <div class="arrow">›</div>
        </a>

        <a href="https://t.me/teobanker" class="menu-item">
            <div class="icon icon-orange">👨‍💻</div>
            <div class="item-text">
                <h2 class="item-title">Liên Hệ Trực Tiếp</h2>
                <p class="item-desc">Cổng hỗ trợ Admin 24/7</p>
            </div>
            <div class="arrow">›</div>
        </a>
    </div>

    <div class="footer">
        <p>Vận hành & Bảo mật bởi TeoBanker © 2026</p>
    </div>

</body>
</html>
